<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập | Bacarap Coffee</title>
  <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-page">
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <div class="login-logo">
          <img src="images/logo.jpg" alt="Bacarap Coffee Logo">
        </div>
        <h1 class="login-title">Bacarap Coffee</h1>
        <p class="login-subtitle">Hệ thống quản lý quán cà phê</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" placeholder="Nhập tên đăng nhập" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        </div>

        <div class="form-group remember">
          <label>
            <input type="checkbox" id="remember"> Ghi nhớ đăng nhập
          </label>
        </div>

        <button type="submit" class="btn-login">Đăng nhập</button>
        <p id="msg" class="msg"></p>
      </form>

      <div class="login-footer">
        <p>Đăng nhập nhanh:</p>
        <div class="quick-login-buttons">
          <button class="quick-btn" data-username="admin" data-password="123">Admin</button>
          <button class="quick-btn" data-username="thungan" data-password="123">Thu ngân</button>
          <button class="quick-btn" data-username="phucvu" data-password="123">Phục vụ</button>
          <button class="quick-btn" data-username="bep" data-password="123">Bếp</button>
        </div>
      </div>
    </div>
  </div>

  <footer>© 2025 Bacarap Coffee</footer>

  <script src="js/login.js"></script>
</body>
</html>
